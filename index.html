h3 {

<script>
// ========= FIREBASE КОНФИГУРАЦИЯ =========
const firebaseConfig = { 
  apiKey: "AIzaSyAuZgI5XVWNSfHKWhAp26SWdD_Ye-3gBzs", 
  authDomain: "detsad-7ca3d.firebaseapp.com", 
  projectId: "detsad-7ca3d", 
  storageBucket: "detsad-7ca3d.firebasestorage.app" 
};

// Инициализация Firebase
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ========= ТЕСТОВЫЕ АККАУНТЫ =========
const TEST_ACCOUNTS = [
  { email: "admin@ladushki.ru", password: "Admin2025", name: "Главный Админ", role: "admin" },
  { email: "teacher@ladushki.ru", password: "Ladushki2025", name: "Воспитатель Анна", role: "teacher" },
  { email: "parent@test.ru", password: "Parent123", name: "Тестовый Родитель", role: "parent" }
];

// ========= АВТОМАТИЧЕСКОЕ СОЗДАНИЕ ТЕСТОВЫХ АККАУНТОВ =========
async function createTestAccounts() {
  console.log("Проверка тестовых аккаунтов...");
  
  for (const account of TEST_ACCOUNTS) {
    try {
      // Пытаемся войти
      await auth.signInWithEmailAndPassword(account.email, account.password);
      console.log(`✓ Аккаунт ${account.email} уже существует`);
      await auth.signOut();
    } catch (error) {
      // Если пользователь не найден - создаём
      if (error.code === 'auth/user-not-found') {
        try {
          console.log(`Создаю аккаунт: ${account.email}`);
          const cred = await auth.createUserWithEmailAndPassword(account.email, account.password);
          await cred.user.updateProfile({ displayName: account.name });
          await db.collection("users").doc(cred.user.uid).set({
            email: account.email,
            role: account.role,
            name: account.name,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          console.log(`✓ Аккаунт ${account.email} создан`);
          await auth.signOut();
        } catch (createError) {
          console.error(`Ошибка создания ${account.email}:`, createError);
        }
      }
    }
  }
  
  // Создаём общее расписание, если его нет
  try {
    const scheduleRef = db.collection("settings").doc("commonSchedule");
    const scheduleDoc = await scheduleRef.get();
    if(!scheduleDoc.exists) {
      await scheduleRef.set({ 
        items: [
          "🍳 08:30 — Завтрак", 
          "🎨 10:00 — Творчество", 
          "🚶 11:30 — Прогулка", 
          "🍲 12:30 — Обед", 
          "😴 13:30 — Тихий час", 
          "🍎 15:30 — Полдник"
        ] 
      });
      console.log("✓ Общее расписание создано");
    }
  } catch(e) {
    console.warn("Ошибка создания расписания:", e);
  }
  
  console.log("Готово!");
}

// ========= ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ =========
function escapeHtml(str) {
  if(!str) return '';
  return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}

async function getUserRole(user) {
  if(!user) return null;
  if(user.email === "admin@ladushki.ru") return "admin";
  if(user.email === "teacher@ladushki.ru") return "teacher";
  
  try {
    const doc = await db.collection("users").doc(user.uid).get();
    if(doc.exists) {
      return doc.data().role;
    }
  } catch(e) {
    console.warn("Ошибка получения роли:", e);
  }
  return "parent";
}

// ========= ФОРМА ВХОДА =========
function showLogin() {
  document.getElementById("screen").innerHTML = `
    <div class="card">
      <h3><i class="fas fa-duck"></i> Вход в аккаунт</h3>
      
      <input id="loginEmail" type="email" placeholder="Email" autocomplete="email">
      <input id="loginPass" type="password" placeholder="Пароль" autocomplete="current-password">
      
      <div id="loginError" class="error-msg"></div>
      
      <button onclick="doLogin()">
        <i class="fas fa-sign-in-alt"></i> Войти
      </button>
      
      <hr>
      
      <div class="small">
        <strong><i class="fas fa-key"></i> Тестовые аккаунты:</strong><br>
        👑 Администратор: <b>admin@ladushki.ru</b> / Admin2025<br>
        👩‍🏫 Воспитатель: <b>teacher@ladushki.ru</b> / Ladushki2025<br>
        👪 Родитель: <b>parent@test.ru</b> / Parent123
      </div>
      
      <div class="small">
        Нет аккаунта? 
        <span style="color:#e68a2e;cursor:pointer;font-weight:bold;" onclick="showRegister()">
          Зарегистрироваться
        </span>
      </div>
    </div>
  `;

// ========= ФУНКЦИЯ ВХОДА =========
async function doLogin() {
  const email = document.getElementById("loginEmail")?.value.trim();
  const pass = document.getElementById("loginPass")?.value;
  const errorDiv = document.getElementById("loginError");
  
  // Очищаем предыдущие ошибки
  errorDiv.style.display = "none";
  errorDiv.innerText = "";
  
  // Проверка заполнения
  if (!email || !pass) {
    errorDiv.style.display = "block";
    errorDiv.innerText = "❌ Заполните оба поля";
    return;
  }
  
  // Простейшая валидация email
  if (!email.includes('@') || !email.includes('.')) {
    errorDiv.style.display = "block";
    errorDiv.innerText = "❌ Введите корректный email (например: name@mail.ru)";
    return;
  }
  
  try {
    console.log("Попытка входа:", email);
    const userCredential = await auth.signInWithEmailAndPassword(email, pass);
    console.log("Успешный вход:", userCredential.user.email);
    
    // Перенаправляем на главную
    navigate('home', document.querySelector(".tab"));
    
  } catch(error) {
    console.error("Ошибка входа:", error.code, error.message);
    errorDiv.style.display = "block";
    
    // Понятные сообщения об ошибках
    switch(error.code) {
      case 'auth/invalid-credential':
        errorDiv.innerHTML = "❌ <strong>Неверный email или пароль</strong><br>Проверьте правильность ввода. Учитывайте регистр букв.";
        break;
      case 'auth/user-not-found':
        errorDiv.innerHTML = "❌ <strong>Пользователь не найден</strong><br>Зарегистрируйтесь или используйте тестовые аккаунты.";
        break;
      case 'auth/wrong-password':
        errorDiv.innerHTML = "❌ <strong>Неверный пароль</strong><br>Попробуйте ещё раз.";
        break;
      case 'auth/invalid-email':
        errorDiv.innerHTML = "❌ <strong>Неверный формат email</strong><br>Пример: name@mail.ru";
        break;
      case 'auth/too-many-requests':
        errorDiv.innerHTML = "❌ <strong>Слишком много попыток</strong><br>Подождите несколько минут и попробуйте снова.";
        break;
      case 'auth/network-request-failed':
        errorDiv.innerHTML = "❌ <strong>Ошибка сети</strong><br>Запустите через Live Server (не двойным кликом по файлу).";
        break;
      default:
        errorDiv.innerHTML = `❌ <strong>Ошибка:</strong> ${error.message}`;
    }
  }
}

// ========= ФОРМА РЕГИСТРАЦИИ =========
function showRegister() {
  document.getElementById("screen").innerHTML = `
    <div class="card">
      <h3><i class="fas fa-child"></i> Регистрация</h3>
      
      <input id="regName" type="text" placeholder="Ваше имя">
      <input id="regEmail" type="email" placeholder="Email">
      <input id="regPass" type="password" placeholder="Пароль (минимум 6 символов)">
      
      <select id="regRole">
        <option value="parent">👪 Родитель</option>
        <option value="teacher">👩‍🏫 Воспитатель</option>
      </select>
      
      <div id="regError" class="error-msg"></div>
      <div id="regSuccess" class="success-msg"></div>
      
      <button onclick="doRegister()">
        <i class="fas fa-user-plus"></i> Зарегистрироваться
      </button>
      
      <div class="small">
        Уже есть аккаунт? 
        <span style="color:#e68a2e;cursor:pointer;font-weight:bold;" onclick="showLogin()">
          Войти
        </span>
      </div>
    </div>
  `;
}

// ========= ФУНКЦИЯ РЕГИСТРАЦИИ =========
async function doRegister() {
  const name = document.getElementById("regName")?.value.trim();
  const email = document.getElementById("regEmail")?.value.trim();
  const pass = document.getElementById("regPass")?.value;
  const role = document.getElementById("regRole")?.value;
  const errorDiv = document.getElementById("regError");
  const successDiv = document.getElementById("regSuccess");
  
  // Скрываем предыдущие сообщения
  errorDiv.style.display = "none";
  successDiv.style.display = "none";
  
  // Валидация
  if (!name || !email || !pass) {
    errorDiv.style.display = "block";
    errorDiv.innerText = "❌ Заполните все поля";
    return;
  }
  
  if (pass.length < 6) {
    errorDiv.style.display = "block";
    errorDiv.innerText = "❌ Пароль должен быть не менее 6 символов";
    return;
  }
  
  if (!email.includes('@') || !email.includes('.')) {
    errorDiv.style.display = "block";
    errorDiv.innerText = "❌ Введите корректный email";
    return;
  }
  
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({ displayName: name });
    
    await db.collection("users").doc(cred.user.uid).set({
      name: name,
      email: email,
      role: role,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    
    successDiv.style.display = "block";
    successDiv.innerHTML = "✅ <strong>Регистрация успешна!</strong><br>Перенаправление...";
    
    setTimeout(() => {
      navigate('home', document.querySelector(".tab"));
    }, 1500);
    
  } catch(error) {
    errorDiv.style.display = "block";
    
    switch(error.code) {
      case 'auth/email-already-in-use':
        errorDiv.innerHTML = "❌ <strong>Email уже зарегистрирован</strong><br>Используйте другой email или войдите в аккаунт.";
        break;
      case 'auth/invalid-email':
        errorDiv.innerHTML = "❌ <strong>Неверный формат email</strong><br>Пример: name@mail.ru";
        break;
      case 'auth/weak-password':
        errorDiv.innerHTML = "❌ <strong>Слишком слабый пароль</strong><br>Используйте не менее 6 символов";
        break;
      default:
        errorDiv.innerHTML = `❌ <strong>Ошибка:</strong> ${error.message}`;
    }
  }
}

      <button onclick="showLogin()" style="background: #ff6b6b; margin-top: 20px;">

// ========= ПРОФИЛЬ =========
async function renderProfile() {
  const user = auth.currentUser;
  
  if (!user) {
    return `
      <div class="card">
        <div class="locked-message">
          <i class="fas fa-lock"></i> Вы не авторизованы
          <button onclick="showLogin()">Войти</button>
          <button onclick="showRegister()">Регистрация</button>
        </div>
      </div>
    `;
  }
  
  let role = "parent";
  let roleName = "Родитель";
  let roleIcon = "👪";
  let roleClass = "parent";
  
  try {
    const doc = await db.collection("users").doc(user.uid).get();
    if(doc.exists) {
      role = doc.data().role;
      if(role === "admin") {
        roleName = "Администратор";
        roleIcon = "👑";
        roleClass = "admin";
      } else if(role === "teacher") {
        roleName = "Воспитатель";
        roleIcon = "👩‍🏫";
        roleClass = "teacher";
      }
    }
  } catch(e) {
    console.warn(e);
  }
  
  // Форматируем дату регистрации (если есть)
  let createdAt = "Неизвестно";
  try {
    const userDoc = await db.collection("users").doc(user.uid).get();
    if(userDoc.exists && userDoc.data().createdAt) {
      const date = userDoc.data().createdAt.toDate();
      createdAt = date.toLocaleDateString('ru-RU');
    }
  } catch(e) {}
  
  return `
    <div class="card">
      <h3><i class="fas fa-id-card"></i> Мой профиль</h3>
      
      <div class="text-center mt-20 mb-10">
        <i class="fas fa-user-circle" style="font-size: 80px; color: #ffb86b;"></i>
        <div style="margin-top: 15px;">
          <strong style="font-size: 1.4rem;">${escapeHtml(user.displayName || "Пользователь")}</strong><br>
          <span class="badge ${roleClass}" style="margin-top: 5px;">${roleIcon} ${roleName}</span>
        </div>
      </div>
      
      <div style="background: #f7efdb; border-radius: 30px; padding: 15px; margin: 15px 0;">
        <div class="flex-row" style="justify-content: space-between;">
          <span><i class="fas fa-envelope"></i> Email:</span>
          <span><strong>${escapeHtml(user.email)}</strong></span>
        </div>
        <div class="flex-row" style="justify-content: space-between; margin-top: 8px;">
          <span><i class="fas fa-calendar-alt"></i> Дата регистрации:</span>
          <span><strong>${createdAt}</strong></span>
        </div>
        <div class="flex-row" style="justify-content: space-between; margin-top: 8px;">
          <span><i class="fas fa-fingerprint"></i> ID:</span>
          <span><small>${user.uid.substring(0, 16)}...</small></span>
        </div>
      </div>
      
      <button onclick="logout()">
        <i class="fas fa-sign-out-alt"></i> Выйти из аккаунта
      </button>
    </div>
  `;
}

// ========= ВЫХОД =========
async function logout() {
  try {
    await auth.signOut();
    console.log("Выход выполнен");
    navigate('home', document.querySelector(".tab"));
  } catch(error) {
    console.error("Ошибка выхода:", error);
  }
}

// ========= НАВИГАЦИЯ =========
async function navigate(screen, tabEl) {
  // Обновляем активную вкладку
  if(tabEl) {
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    tabEl.classList.add("active");
  }
  
  const root = document.getElementById("screen");
  if(!root) return;
  
  // Анимация загрузки
  root.style.opacity = "0";
  
  setTimeout(async () => {
    let html = "";
    
    if (screen === "home") {
      html = await renderHome();
    } else if (screen === "profile") {
      html = await renderProfile();
    } else {
      html = `<div class="card">Страница в разработке</div>`;
    }
    
    root.innerHTML = html;
    root.style.opacity = "1";
  }, 100);
}

// ========= ЗАПУСК ПРИЛОЖЕНИЯ =========
// Создаём тестовые аккаунты и запускаем приложение
createTestAccounts().then(() => {
  // Подписываемся на изменения состояния авторизации
  auth.onAuthStateChanged((user) => {
    console.log("Состояние авторизации:", user ? user.email : "не авторизован");
    navigate('home', document.querySelector(".tab"));
  });
}).catch(error => {
  console.error("Ошибка инициализации:", error);
  // Даже если ошибка, показываем интерфейс
  auth.onAuthStateChanged((user) => {
    navigate('home', document.querySelector(".tab"));
  });
});
</script>
